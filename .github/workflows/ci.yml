name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  arch-gate:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: ArchGate (dependency direction boundaries)
        shell: cmd
        run: call RunArchGate.bat

  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      # LFS 全量约 1.4GB（含与构建无关的 RenderControl/），只拉 thirdparty 并缓存，
      # 缓存命中时零 LFS 带宽消耗
      - name: Compute LFS manifest (thirdparty only)
        shell: bash
        run: git lfs ls-files -l | grep "project/thirdparty/" | cut -d' ' -f1 | sort > .lfs-manifest
      - name: Cache LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-thirdparty-${{ hashFiles('.lfs-manifest') }}
      - name: Pull LFS objects (thirdparty only)
        shell: bash
        run: git lfs pull --include="project/thirdparty/**"
      - name: Generate VS2022 solution
        shell: cmd
        run: call generate_vs2022.bat
      - name: Build Editor (Debug)
        shell: cmd
        run: call build_editor.bat Debug
      - name: Build Sandbox (Debug)
        shell: cmd
        run: call build_sandbox.bat Debug
      - name: Unit tests (doctest, Debug)
        shell: cmd
        run: call RunTests.bat Debug
      - name: Build Editor (Release)
        shell: cmd
        run: call build_editor.bat Release
      - name: Build Sandbox (Release)
        shell: cmd
        run: call build_sandbox.bat Release
      # hosted runner 无 GPU:Vulkan 无 ICD 必挂,DX12 依赖 WARP 软渲染,属实验性;
      # 先 continue-on-error 观察,稳定后再转为阻断步骤
      - name: Smoke test Sandbox (DX12/WARP, Release, experimental)
        shell: cmd
        continue-on-error: true
        run: call run.bat sandbox dx12 Release --smoke-test-seconds=10
