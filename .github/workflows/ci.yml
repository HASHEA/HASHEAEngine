name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  # PR 不做 workflow 级路径过滤:required status check 若因 paths-ignore 整个不触发,
  # 会永远停在 Expected 卡死合并。改为 changes job 判定后在 job 级跳过——
  # skipped 的 job 在分支保护里按通过算
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.diff.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: diff
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files=$(git diff --name-only HEAD^1 HEAD)
          else
            files="code-change"
          fi
          echo "changed files:"
          echo "$files"
          if echo "$files" | grep -vE '^docs/|\.md$' | grep -q .; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  arch-gate:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: ArchGate (dependency direction boundaries)
        shell: cmd
        run: call RunArchGate.bat

  build-and-test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      # LFS 全量约 1.4GB（含与构建无关的 RenderControl/），只拉 thirdparty 并缓存，
      # 缓存命中时零 LFS 带宽消耗
      - name: Compute LFS manifest (thirdparty only)
        shell: bash
        run: git lfs ls-files -l | grep "project/thirdparty/" | cut -d' ' -f1 | sort > .lfs-manifest
      - name: Cache LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-thirdparty-${{ hashFiles('.lfs-manifest') }}
      - name: Pull LFS objects (thirdparty only)
        shell: bash
        run: git lfs pull --include="project/thirdparty/**"
      - name: Generate VS2022 solution
        shell: cmd
        run: call generate_vs2022.bat
      - name: Build Editor (Debug)
        shell: cmd
        run: call build_editor.bat Debug
      - name: Build Sandbox (Debug)
        shell: cmd
        run: call build_sandbox.bat Debug
      - name: Unit tests (doctest, Debug)
        shell: cmd
        run: call RunTests.bat Debug
      - name: Build Editor (Release)
        shell: cmd
        run: call build_editor.bat Release
      - name: Build Sandbox (Release)
        shell: cmd
        run: call build_sandbox.bat Release
      # hosted runner 无 GPU:DX12 冒烟跑在 WARP(Windows 自带软件光栅化)上,已验证可行
      # --rhi-selftest-indirect 同时覆盖首帧前 raw RHI 与 Function RenderGraph full-chain indirect 自测；
      # constant-buffer 自测保持独立。任一 FAIL 都会传播为 runtime failure；全部 PASS 后同进程继续 readiness
      - name: Smoke test Sandbox (DX12/WARP, Release)
        shell: cmd
        run: call run.bat sandbox dx12 Release --smoke-test-seconds=120 --rhi-selftest-indirect --rhi-selftest-constant-buffer
      # Vulkan 无微软自带软件实现:ICD 用 mesa lavapipe(CPU 驱动),loader(vulkan-1.dll,
      # 平时由显卡驱动安装)从 LunarG runtime 组件取,放进运行目录。
      # runner 进程提权运行,loader 会无视 VK_DRIVER_FILES/VK_ICD_FILENAMES 环境变量,
      # ICD 必须注册进 HKLM 注册表
      - name: Install lavapipe + Vulkan loader (software Vulkan)
        shell: pwsh
        run: |
          curl.exe -fsSL -o mesa.7z https://github.com/pal1000/mesa-dist-win/releases/download/26.1.3/mesa3d-26.1.3-release-msvc.7z
          7z x mesa.7z -omesa -y | Out-Null
          $icd = Get-ChildItem mesa -Recurse -Filter lvp_icd.x86_64.json | Select-Object -First 1
          if (-not $icd) { Get-ChildItem mesa -Recurse -Name; throw "lvp_icd.x86_64.json not found in mesa package" }
          curl.exe -fsSL -o vulkan-rt.zip https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-runtime-components.zip
          Expand-Archive vulkan-rt.zip -DestinationPath vulkan-rt
          $loader = Get-ChildItem vulkan-rt -Recurse -Filter vulkan-1.dll | Where-Object { $_.FullName -match '\\x64\\' } | Select-Object -First 1
          if (-not $loader) { throw "vulkan-1.dll (x64) not found in runtime components" }
          Copy-Item $loader.FullName product/bin64/Release-windows-x86_64/
          reg add "HKLM\SOFTWARE\Khronos\Vulkan\Drivers" /v $icd.FullName /t REG_DWORD /d 0 /f
          "VK_LOADER_DEBUG=error,warn,driver" >> $env:GITHUB_ENV
      - name: Smoke test Sandbox (Vulkan/lavapipe, Release)
        shell: cmd
        run: call run.bat sandbox vulkan Release --smoke-test-seconds=120 --rhi-selftest-indirect --rhi-selftest-constant-buffer
